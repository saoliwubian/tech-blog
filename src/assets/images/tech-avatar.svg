<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="avatarBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="iconColor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#avatarBg)"/>
  <!-- CPU/tech icon -->
  <rect x="60" y="60" width="80" height="80" rx="12" fill="none" stroke="url(#iconColor)" stroke-width="3"/>
  <rect x="72" y="72" width="56" height="56" rx="4" fill="none" stroke="url(#iconColor)" stroke-width="2" opacity="0.5"/>
  <!-- Pins -->
  <line x1="60" y1="75" x2="48" y2="75" stroke="url(#iconColor)" stroke-width="2"/>
  <line x1="60" y1="90" x2="48" y2="90" stroke="url(#iconColor)" stroke-width="2"/>
  <line x1="60" y1="105" x2="48" y2="105" stroke="url(#iconColor)" stroke-width="2"/>
  <line x1="60" y1="120" x2="48" y2="120" stroke="url(#iconColor)" stroke-width="2"/>
  <line x1="140" y1="75" x2="152" y2="75" stroke="url(#iconColor)" stroke-width="2"/>
  <line x1="140" y1="90" x2="152" y2="90" stroke="url(#iconColor)" stroke-width="2"/>
  <line x1="140" y1="105" x2="152" y2="105" stroke="url(#iconColor)" stroke-width="2"/>
  <line x1="140" y1="120" x2="152" y2="120" stroke="url(#iconColor)" stroke-width="2"/>
  <!-- Center TP text -->
  <text x="100" y="112" text-anchor="middle" fill="url(#iconColor)" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" letter-spacing="2">TP</text>
</svg>
