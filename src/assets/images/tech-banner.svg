<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="400" stroke="#fff" stroke-width="1"/>
  </g>
  
  <!-- Circuit-like paths -->
  <g opacity="0.1" stroke="#3b82f6" stroke-width="2" fill="none">
    <path d="M50 350 H150 V250 H250 V150 H400 V200 H500"/>
    <circle cx="500" cy="200" r="4" fill="#3b82f6"/>
    <path d="M550 350 H650 V300 H750 V250 H900 V200 H1000 V150 H1100"/>
    <circle cx="1100" cy="150" r="4" fill="#3b82f6"/>
    <path d="M100 50 V150 H300 V100 H450 V50 H600"/>
    <circle cx="600" cy="50" r="4" fill="#06b6d4"/>
    <path d="M700 50 V100 H850 V150 H950 V100 H1050 V50 H1150"/>
    <circle cx="1150" cy="50" r="4" fill="#06b6d4"/>
  </g>
  
  <!-- Binary numbers background -->
  <g opacity="0.08" fill="#3b82f6" font-family="monospace" font-size="14">
    <text x="50" y="80">01010110 01101001 01110011 01101001 01101111 01101110</text>
    <text x="50" y="110">01000110 01110101 01110100 01110101 01110010 01100101</text>
    <text x="50" y="370">01010100 01100101 01100011 01101000 01101110 01101111</text>
    <text x="800" y="370">01001001 01101110 01101110 01101111 01110110 01100001</text>
  </g>
  
  <!-- Center title -->
  <text x="600" y="200" text-anchor="middle" fill="url(#accent)" font-family="system-ui, sans-serif" font-size="64" font-weight="bold" letter-spacing="4">
    TechPulse
  </text>
  <text x="600" y="260" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="28" font-weight="300" letter-spacing="8">
    科 技 脉 搏
  </text>
  <text x="600" y="310" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="16" font-weight="300" letter-spacing="4">
    探索前沿技术 · 洞察数字未来
  </text>
  
  <!-- Decorative dots -->
  <circle cx="120" cy="80" r="3" fill="#3b82f6" opacity="0.3"/>
  <circle cx="1080" cy="80" r="3" fill="#06b6d4" opacity="0.3"/>
  <circle cx="600" cy="50" r="2" fill="#3b82f6" opacity="0.5"/>
</svg>
